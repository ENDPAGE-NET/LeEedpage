<!DOCTYPE html>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      body {
        min-height: 100dvh;
      }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary/20 overflow-x-hidden">
<!-- Top AppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fdf8fd]/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 border-b border-outline-variant/10">
<div class="flex items-center">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
</div>
<h1 class="text-primary font-headline font-extrabold tracking-tight text-lg">账户设置</h1>
<div class="flex items-center">
<div class="w-9 h-9 rounded-full ring-2 ring-primary/10 overflow-hidden">
<img alt="User" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMzOygGRP3-f2mI8HrrHQDt277w_VqNv-BvFmjifH2kKHF49n9AetJTR4dmeCnV7YkPRc16CjS0gcqP0UUDCBsIa5CrBSXJaoVgKAt-W4Kwhwh4jQcDgPzfnMRtrqK2q1EzDpnTonW490ApY4vtxjw8DxpVNSEuQot9vYRJHaLEkkJddQRIo0Xc-7IRBdKCQWHs7gVYixM3Z8jziCGLHYO68CaJX3E4UwzeWOVlyEdOQyR83Nw-xNd2LfPqAFqGnNzfnPyNYnscF0"/>
</div>
</div>
</header>
<main class="pt-24 pb-36 px-6 max-w-md mx-auto relative z-10">
<!-- Introduction Header -->
<section class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary-container/10 mb-6 relative">
<div class="absolute inset-0 rounded-full border-2 border-dashed border-primary/20 animate-[spin_10s_linear_infinite]"></div>
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<h2 class="text-3xl font-headline font-extrabold text-primary mb-3">完成账户初始化</h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[260px] mx-auto">
            为了确保您的考勤安全，请按照以下步骤完成设置。
        </p>
</section>
<!-- Setup Wizard Steps -->
<div class="space-y-4">
<!-- Step 1 Card -->
<div class="group relative bg-surface-container-lowest p-6 rounded-full flex items-center justify-between border border-outline-variant/10 shadow-sm transition-all duration-300 hover:shadow-lg hover:border-primary/20 active:scale-[0.98]">
<div class="flex items-center gap-4">
<!-- Step Number Badge -->
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border-2 border-primary/10 shrink-0">
<span class="text-primary font-bold font-headline text-lg">1</span>
</div>
<!-- Info -->
<div class="flex flex-col">
<div class="flex items-center gap-2 mb-0.5">
<span class="material-symbols-outlined text-primary text-[20px]">lock</span>
<span class="font-headline font-extrabold text-on-surface">修改密码</span>
</div>
<span class="text-xs text-on-surface-variant/80">保障您的账户访问安全</span>
</div>
</div>
<!-- Status Icon -->
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold tracking-widest text-outline uppercase px-3 py-1 rounded-full bg-surface-container-low border border-outline-variant/10">待处理</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>
<!-- Step 2 Card -->
<div class="group relative bg-surface-container-lowest p-6 rounded-full flex items-center justify-between border border-outline-variant/10 shadow-sm transition-all duration-300 hover:shadow-lg hover:border-primary/20 active:scale-[0.98]">
<div class="flex items-center gap-4">
<!-- Step Number Badge -->
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border-2 border-primary/10 shrink-0">
<span class="text-primary font-bold font-headline text-lg">2</span>
</div>
<!-- Info -->
<div class="flex flex-col">
<div class="flex items-center gap-2 mb-0.5">
<span class="material-symbols-outlined text-primary text-[20px]">face</span>
<span class="font-headline font-extrabold text-on-surface">注册人脸</span>
</div>
<span class="text-xs text-on-surface-variant/80">用于日常上下班打卡验证</span>
</div>
</div>
<!-- Status Icon -->
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold tracking-widest text-outline uppercase px-3 py-1 rounded-full bg-surface-container-low border border-outline-variant/10">待处理</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</div>
</div>
</div>
<!-- Progress Indicator -->
<div class="mt-16 flex flex-col items-center gap-4">
<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden p-0.5">
<div class="w-0 h-full bg-primary rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(0,95,183,0.3)]"></div>
</div>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-outline/20 animate-pulse"></div>
<span class="text-xs font-bold tracking-widest text-outline uppercase">当前进度 0%</span>
</div>
</div>
</main>
<!-- Bottom Actions Container -->
<footer class="fixed bottom-0 left-0 w-full p-8 pb-10 bg-gradient-to-t from-background via-background/95 to-transparent flex justify-center z-20">
<div class="w-full max-w-md">
<button class="w-full py-5 bg-outline/10 text-outline-variant font-headline font-extrabold rounded-full cursor-not-allowed transition-all duration-300 border border-outline-variant/5 shadow-inner" disabled="">
            激活账户
        </button>
<p class="text-center text-[10px] mt-5 text-on-surface-variant/50 font-medium tracking-wide">
            * 请完成以上所有步骤以激活您的企业账号
        </p>
</div>
</footer>
<!-- Decorative Elements - Entropy Axis Style -->
<div class="fixed top-[-5%] right-[-15%] w-[60%] h-[60%] bg-primary/5 blur-[100px] -z-10 rounded-full animate-pulse"></div>
<div class="fixed bottom-[10%] left-[-20%] w-[50%] h-[50%] bg-secondary-container/10 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed top-[20%] left-[-10%] w-[100px] h-[100px] border border-primary/5 rounded-full -z-10"></div>
<div class="fixed bottom-[30%] right-[5%] w-[150px] h-[150px] border border-primary/10 rounded-full -z-10"></div>
