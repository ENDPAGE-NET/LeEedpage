<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#005FB7",
              "on-primary": "#ffffff",
              "background": "#FDFBFF",
              "surface": "#FDFBFF",
              "surface-variant": "#E0E2EC",
              "on-surface": "#1A1C1E",
              "on-surface-variant": "#44474E",
              "outline": "#74777F",
              "outline-variant": "#C4C6D0",
              "primary-container": "#D6E3FF",
              "on-primary-container": "#001B3E",
              "secondary": "#565E71",
              "on-secondary": "#FFFFFF",
              "secondary-container": "#DAE2F9",
              "on-secondary-container": "#131C2B"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "1.5rem",
              "lg": "2rem",
              "xl": "2.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #FDFBFF;
        letter-spacing: -0.01em;
      }
      .input-field {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .input-field:focus-within {
        background-color: #FFFFFF;
        box-shadow: 0 0 0 2px #005FB7;
      }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl flex items-center justify-between px-6 h-20">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-secondary-container/50 active:scale-90 transition-all text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-on-surface">修改密码</h1>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBefimJ-9R2z8FJBRJG5CDG8A2d73y9QQWUh3_Z2f_JD5dYP95al3ZTKWTJoBStYlXDtmrmTCTglLVbXI0DpW2W8yvEJoEPouzfhb4cbFN6NQxGzqHpoOEgHxgAbZtpNXxOk59UZQDqyS7BGAksC2ws6d6PLs-QxiOTD5uaLV6JHd9erzxVU6pBwHL1ezSUy_x6SYDswDtjALfoB3joLwoN-yHGrDDNidFEupNZY4iCeMfK1TNdHry2uHn9O2Su-bZoGBGsNJSMAPE"/>
</div>
</div>
</header>
<main class="pt-28 pb-12 px-8 max-w-md mx-auto">
<!-- Hero Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-24 h-24 bg-primary-container/30 rounded-full mb-8">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="lock_reset" style="font-variation-settings: 'wght' 300;">lock_reset</span>
</div>
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface mb-3">更新您的安全凭据</h2>
<p class="text-on-surface-variant text-base leading-relaxed">
                考勤安全是企业秩序的基石。<br/>新密码需包含字母与数字。
            </p>
</div>
<!-- Password Form -->
<form class="space-y-8">
<!-- Current Password -->
<div class="space-y-2">
<label class="block text-sm font-bold text-on-surface-variant ml-2" for="current-password">当前密码</label>
<div class="relative group">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock_open">lock_open</span>
<input class="w-full pl-14 pr-14 py-5 bg-secondary-container/30 border-none rounded-full focus:ring-0 text-on-surface placeholder:text-outline/60 input-field" id="current-password" placeholder="请输入当前密码" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="space-y-2">
<label class="block text-sm font-bold text-on-surface-variant ml-2" for="new-password">新密码</label>
<div class="relative group">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="key">key</span>
<input class="w-full pl-14 pr-14 py-5 bg-secondary-container/30 border-none rounded-full focus:ring-0 text-on-surface placeholder:text-outline/60 input-field" id="new-password" placeholder="请输入新密码" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="mt-4 flex gap-2 px-2">
<div class="h-1.5 flex-1 rounded-full bg-primary"></div>
<div class="h-1.5 flex-1 rounded-full bg-outline-variant"></div>
<div class="h-1.5 flex-1 rounded-full bg-outline-variant"></div>
<div class="h-1.5 flex-1 rounded-full bg-outline-variant"></div>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block text-sm font-bold text-on-surface-variant ml-2" for="confirm-password">确认新密码</label>
<div class="relative group">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="verified_user">verified_user</span>
<input class="w-full pl-14 pr-14 py-5 bg-secondary-container/30 border-none rounded-full focus:ring-0 text-on-surface placeholder:text-outline/60 input-field" id="confirm-password" placeholder="请再次输入新密码" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary font-bold py-5 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-lg" type="submit">
                    提交修改
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Security Tips - Entropy Axis Card Style -->
<div class="mt-16 p-8 bg-white rounded-xl shadow-sm border border-outline-variant/30">
<div class="flex items-center gap-4 mb-6">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-2xl" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h3 class="font-bold text-lg text-on-surface">安全策展指南</h3>
</div>
<ul class="space-y-5 text-[15px] text-on-surface-variant leading-relaxed">
<li class="flex gap-4">
<span class="w-2 h-2 rounded-full bg-primary mt-2 flex-shrink-0"></span>
<span>避免使用易被检索的个人信息作为密码，如生日、工号。</span>
</li>
<li class="flex gap-4">
<span class="w-2 h-2 rounded-full bg-primary mt-2 flex-shrink-0"></span>
<span>定期更新凭据，构建有序的个人数字安全屏障。</span>
</li>
<li class="flex gap-4">
<span class="w-2 h-2 rounded-full bg-primary mt-2 flex-shrink-0"></span>
<span>修改成功后，为保障数据隔离，系统将重置其他受信任设备。</span>
</li>
</ul>
</div>
</main>
<!-- Success Feedback Overlay -->
<div class="hidden fixed inset-0 z-[60] bg-on-surface/40 backdrop-blur-md flex items-center justify-center px-6">
<div class="bg-surface p-10 rounded-xl w-full max-w-sm text-center shadow-2xl animate-in fade-in zoom-in duration-300">
<div class="w-20 h-20 bg-primary-container/50 text-primary rounded-full flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h3 class="text-2xl font-bold text-on-surface mb-3">密码修改成功</h3>
<p class="text-on-surface-variant text-base mb-8 px-4">您的账户安全级别已提升。请使用新凭据重新建立连接。</p>
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-full active:scale-95 transition-transform">
                返回登录
            </button>
</div>
</div>
</body></html>
