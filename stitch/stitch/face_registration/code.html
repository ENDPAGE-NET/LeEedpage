<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "on-tertiary-container": "#ffd1bb",
              "on-surface": "#1c1b1f",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#005eb4",
              "inverse-primary": "#a8c8ff",
              "surface-variant": "#e5e1e7",
              "on-secondary-container": "#475c7f",
              "error": "#ba1a1a",
              "background": "#fdf8fd",
              "outline-variant": "#c1c6d4",
              "on-primary-fixed": "#001b3c",
              "inverse-surface": "#313034",
              "on-tertiary-fixed": "#331100",
              "on-secondary-fixed-variant": "#324769",
              "tertiary-fixed-dim": "#ffb68f",
              "secondary-fixed": "#d6e3ff",
              "outline": "#727783",
              "primary-container": "#005fb7",
              "on-secondary": "#ffffff",
              "surface-container": "#f1ecf2",
              "surface-container-low": "#f7f2f8",
              "primary-fixed-dim": "#a8c8ff",
              "tertiary-fixed": "#ffdbca",
              "surface-bright": "#fdf8fd",
              "tertiary": "#7a3300",
              "on-primary-fixed-variant": "#00468a",
              "on-background": "#1c1b1f",
              "on-primary-container": "#c9dbff",
              "on-secondary-fixed": "#011b3b",
              "secondary": "#4a5f82",
              "on-tertiary-fixed-variant": "#773200",
              "surface-container-high": "#ebe7ec",
              "surface": "#fdf8fd",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#9f4500",
              "primary-fixed": "#d6e3ff",
              "error-container": "#ffdad6",
              "secondary-container": "#c0d5fe",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e5e1e7",
              "inverse-on-surface": "#f4eff5",
              "primary": "#00478c",
              "on-surface-variant": "#414752",
              "surface-dim": "#ddd9de",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#b2c7f0"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(253, 248, 253, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-header flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-primary hover:bg-black/5 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight text-primary text-xl">人脸注册</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-secondary text-sm font-medium">李明远</span>
<div class="w-8 h-8 rounded-full overflow-hidden bg-secondary-container">
<img alt="User" data-alt="professional headshot of a young asian man in a business casual outfit with a neutral studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_GO-YmUY8ro1v3-pxID1_Y-w2DCrTfvflWkUesgvZqZDc3M7LIXN2f0nKsgXsMy5Rx6jLGJ7SxJNW1lW88MWgeBzD6pgbll13R2CM18vKQeGSkWKMUqqoCpUG-5uR75aGjZzwrD-4TaDeM2_NbVM_gXR6keEIUjyFc0q3SrWI5VCdQQbpN0NcP5Pc0oVEED-sDrZXcx8qCLHyxspWNQivbTkbrkW03E6tgs12Oq_BTXx-qnnIdoliE8O_BbTEQnzY4Kfnfa1CgA4"/>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-16 px-6 pt-8 pb-32 max-w-2xl mx-auto w-full">
<!-- Instruction Section -->
<section class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="face_retouching_natural">face_retouching_natural</span>
</div>
<h2 class="text-on-surface font-headline font-bold text-2xl mb-3">录入面部信息</h2>
<p class="text-on-surface-variant leading-relaxed px-4">
                请拍摄1-3张清晰面部照片（建议正面、左侧、右侧各一张）
            </p>
</section>
<!-- Asymmetric Bento-style Grid -->
<div class="grid grid-cols-2 gap-4 mb-10">
<!-- Slot 1: Filled -->
<div class="relative group aspect-[4/5] rounded-xl overflow-hidden bg-surface-container-low shadow-sm">
<img alt="Front view" class="w-full h-full object-cover" data-alt="close-up portrait of a man's face looking directly at camera with clear lighting and neutral expression for biometric identification" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4sjqsAnGSu9G-_GF3XZAcl2SmjSY1Au-Ft6quRyKwBDJRNx9Gu2x1_h405Bnp6j3ZgWQ8j5VFWOd625aCtXelvikeBYww1s5fyF80jxqKYxsx44Rxl4naJ03HAI7LaDs_gipaLfRvw-Mg8ODuzNqeQUCvbBk9WdQdOAoL1rFfDVfgS0MfhR45K5v9VQaDpAYcRGmSz0YywcrJY8YplbEk2S8xHo9TNGSJfBee7qg5yPcxKQjC01m8jfswHZFGRFtvLRkCqSnGN_E"/>
<div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
<button class="bg-error text-on-error w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<div class="absolute bottom-3 left-3 bg-primary/80 backdrop-blur-md px-3 py-1 rounded-full">
<span class="text-[10px] font-bold text-white uppercase tracking-wider">正面已录入</span>
</div>
</div>
<!-- Slot 2: Empty/Dashed -->
<button class="aspect-[4/5] rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-3 hover:bg-surface-container-high transition-colors group active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="text-sm font-semibold text-outline group-hover:text-primary transition-colors">添加左侧照</span>
</button>
<!-- Slot 3: Empty/Dashed -->
<button class="aspect-[4/5] rounded-xl border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-3 hover:bg-surface-container-high transition-colors group active:scale-[0.98]">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="text-sm font-semibold text-outline group-hover:text-primary transition-colors">添加右侧照</span>
</button>
<!-- Tips Card (Bento element) -->
<div class="aspect-[4/5] rounded-xl bg-secondary-container/30 p-5 flex flex-col justify-between">
<div>
<span class="material-symbols-outlined text-secondary mb-2" data-icon="lightbulb">lightbulb</span>
<h3 class="text-secondary font-bold text-sm">拍摄建议</h3>
</div>
<ul class="text-[11px] text-on-secondary-container/80 space-y-2 leading-snug">
<li class="flex items-start gap-2">
<span class="w-1 h-1 rounded-full bg-secondary mt-1.5 shrink-0"></span>
                        避免佩戴墨镜、口罩或帽子
                    </li>
<li class="flex items-start gap-2">
<span class="w-1 h-1 rounded-full bg-secondary mt-1.5 shrink-0"></span>
                        确保光线充足，避免背光
                    </li>
<li class="flex items-start gap-2">
<span class="w-1 h-1 rounded-full bg-secondary mt-1.5 shrink-0"></span>
                        露出完整五官与轮廓
                    </li>
</ul>
</div>
</div>
<!-- Compliance & Security -->
<div class="flex items-center gap-3 p-4 bg-surface-container-low rounded-xl mb-6">
<span class="material-symbols-outlined text-primary text-xl" data-icon="verified_user">verified_user</span>
<p class="text-[11px] text-on-surface-variant leading-tight">
                您的面部数据将经过加密处理，仅用于企业考勤校验。熵析云枢承诺严格保护您的生物特征隐私。
            </p>
</div>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pointer-events-none">
<div class="max-w-2xl mx-auto pointer-events-auto">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-bold shadow-xl shadow-primary/20 hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95 flex items-center justify-center gap-2">
<span>提交注册</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</body></html>
