<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "on-tertiary-container": "#ffd1bb",
              "on-surface": "#1c1b1f",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#005eb4",
              "inverse-primary": "#a8c8ff",
              "surface-variant": "#e5e1e7",
              "on-secondary-container": "#475c7f",
              "error": "#ba1a1a",
              "background": "#fdf8fd",
              "outline-variant": "#c1c6d4",
              "on-primary-fixed": "#001b3c",
              "inverse-surface": "#313034",
              "on-tertiary-fixed": "#331100",
              "on-secondary-fixed-variant": "#324769",
              "tertiary-fixed-dim": "#ffb68f",
              "secondary-fixed": "#d6e3ff",
              "outline": "#727783",
              "primary-container": "#005fb7",
              "on-secondary": "#ffffff",
              "surface-container": "#f1ecf2",
              "surface-container-low": "#f7f2f8",
              "primary-fixed-dim": "#a8c8ff",
              "tertiary-fixed": "#ffdbca",
              "surface-bright": "#fdf8fd",
              "tertiary": "#7a3300",
              "on-primary-fixed-variant": "#00468a",
              "on-background": "#1c1b1f",
              "on-primary-container": "#c9dbff",
              "on-secondary-fixed": "#011b3b",
              "secondary": "#4a5f82",
              "on-tertiary-fixed-variant": "#773200",
              "surface-container-high": "#ebe7ec",
              "surface": "#fdf8fd",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#9f4500",
              "primary-fixed": "#d6e3ff",
              "error-container": "#ffdad6",
              "secondary-container": "#c0d5fe",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e5e1e7",
              "inverse-on-surface": "#f4eff5",
              "primary": "#00478c",
              "on-surface-variant": "#414752",
              "surface-dim": "#ddd9de",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#b2c7f0"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .headline-font {
            font-family: 'Manrope', sans-serif;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center overflow-hidden">
<!-- Background Gradient (Primary to Surface) -->
<div class="fixed inset-0 bg-gradient-to-br from-primary/10 via-surface to-background -z-10"></div>
<!-- Decorative Elements (Abstract Shapes) -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl opacity-40"></div>
<div class="fixed -bottom-32 -left-32 w-[32rem] h-[32rem] bg-secondary-container/30 rounded-full blur-3xl opacity-30"></div>
<main class="w-full max-w-md px-8 py-12 flex flex-col items-center">
<!-- Logo Branding Section -->
<div class="mb-12 flex flex-col items-center text-center">
<!-- Fingerprint Icon Circle -->
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(0,71,140,0.12)] mb-6 ring-4 ring-primary/5">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="fingerprint">fingerprint</span>
</div>
<h1 class="headline-font text-3xl font-extrabold text-primary tracking-tight mb-2">
                熵析云枢
            </h1>
<p class="text-on-surface-variant text-sm font-medium tracking-widest opacity-80">
                企业考勤管理系统
            </p>
</div>
<!-- Login Form Container -->
<div class="w-full space-y-6">
<!-- Username Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" placeholder="用户名" type="text"/>
</div>
<!-- Password Field -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-2xl text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-300" placeholder="请输入密码" type="password"/>
</div>
<!-- Forgot Password / Helper -->
<div class="flex justify-end px-2">
<button class="text-xs font-semibold text-primary/70 hover:text-primary transition-colors">忘记密码？</button>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-full shadow-[0_12px_24px_rgba(0,71,140,0.25)] active:scale-[0.98] transition-all duration-200 headline-font text-lg">
                    登录
                </button>
</div>
</div>
<!-- Footer / Additional Options -->
<div class="mt-16 text-center space-y-4">
<div class="flex items-center justify-center space-x-4">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<span class="text-xs text-outline font-medium">其他登录方式</span>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
<div class="flex justify-center space-x-6">
<button class="w-12 h-12 rounded-2xl bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="qr_code_scanner">qr_code_scanner</span>
</button>
<button class="w-12 h-12 rounded-2xl bg-surface-container-high flex items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="face">face</span>
</button>
</div>
</div>
</main>
<!-- Version Text -->
<div class="fixed bottom-8 w-full text-center">
<p class="text-[10px] text-outline uppercase tracking-[0.2em] font-bold">
            Version 4.2.0 • Secure Infrastructure
        </p>
</div>
</body></html>
