<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "on-tertiary-container": "#ffd1bb",
              "on-surface": "#1A1C1E",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#005FB7",
              "inverse-primary": "#D1E4FF",
              "surface-variant": "#E1E2EC",
              "on-secondary-container": "#1D1B1E",
              "error": "#BA1A1A",
              "background": "#F8F9FF",
              "outline-variant": "#C4C6D0",
              "on-primary-fixed": "#001B3C",
              "inverse-surface": "#2F3033",
              "on-tertiary-fixed": "#311100",
              "on-secondary-fixed-variant": "#44474E",
              "tertiary-fixed-dim": "#FFB68F",
              "secondary-fixed": "#E1E2EC",
              "outline": "#74777F",
              "primary-container": "#D1E4FF",
              "on-secondary": "#FFFFFF",
              "surface-container": "#F0F0F3",
              "surface-container-low": "#F4F3F7",
              "primary-fixed-dim": "#A8C8FF",
              "tertiary-fixed": "#FFDBCA",
              "surface-bright": "#F8F9FF",
              "tertiary": "#8F4C00",
              "on-primary-fixed-variant": "#00468A",
              "on-background": "#1A1C1E",
              "on-primary-container": "#001D36",
              "on-secondary-fixed": "#1A1C1E",
              "secondary": "#535F70",
              "on-tertiary-fixed-variant": "#6D3900",
              "surface-container-high": "#EAE9EE",
              "surface": "#F8F9FF",
              "on-tertiary": "#FFFFFF",
              "tertiary-container": "#FFDDB3",
              "primary-fixed": "#D1E4FF",
              "error-container": "#FFDAD6",
              "secondary-container": "#D7E3F7",
              "on-primary": "#FFFFFF",
              "surface-container-highest": "#E4E2E6",
              "inverse-on-surface": "#F1F0F4",
              "primary": "#005FB7",
              "on-surface-variant": "#44474E",
              "surface-dim": "#D9D9DD",
              "on-error-container": "#410002",
              "secondary-fixed-dim": "#BFC8D8",
              "success": "#4CAF50"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1.5rem", "lg": "2.5rem", "xl": "3.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(248, 249, 255, 0.7);
            backdrop-filter: blur(12px);
        }
        .curator-card {
            box-shadow: 0 4px 24px -2px rgba(0, 95, 183, 0.06);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .curator-card:hover {
            box-shadow: 0 12px 48px -4px rgba(0, 95, 183, 0.12);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-header flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="text-primary hover:bg-primary/5 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-extrabold tracking-tight text-primary text-xl">人脸注册</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-secondary text-sm font-semibold">李明远</span>
<div class="w-9 h-9 rounded-full overflow-hidden border-2 border-primary/10">
<img alt="User" data-alt="professional headshot of a young asian man in a business casual outfit with a neutral studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_GO-YmUY8ro1v3-pxID1_Y-w2DCrTfvflWkUesgvZqZDc3M7LIXN2f0nKsgXsMy5Rx6jLGJ7SxJNW1lW88MWgeBzD6pgbll13R2CM18vKQeGSkWKMUqqoCpUG-5uR75aGjZzwrD-4TaDeM2_NbVM_gXR6keEIUjyFc0q3SrWI5VCdQQbpN0NcP5Pc0oVEED-sDrZXcx8qCLHyxspWNQivbTkbrkW03E6tgs12Oq_BTXx-qnnIdoliE8O_BbTEQnzY4Kfnfa1CgA4"/>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 mt-16 px-6 pt-10 pb-32 max-w-2xl mx-auto w-full">
<!-- Instruction Section -->
<section class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary/5 rounded-full mb-8 relative">
<div class="absolute inset-0 bg-primary/5 rounded-full animate-pulse"></div>
<span class="material-symbols-outlined text-primary text-4xl relative z-10" data-icon="face_retouching_natural">face_retouching_natural</span>
</div>
<h2 class="text-on-surface font-headline font-extrabold text-3xl mb-4">录入面部信息</h2>
<p class="text-on-surface-variant leading-relaxed px-8 font-medium opacity-80">
            请拍摄1-3张清晰面部照片<br/>建议正面、左侧、右侧各一张
        </p>
</section>
<!-- Asymmetric Bento-style Grid -->
<div class="grid grid-cols-2 gap-5 mb-10">
<!-- Slot 1: Filled -->
<div class="relative group aspect-[4/5] rounded-[2.5rem] overflow-hidden curator-card bg-surface-container-low">
<img alt="Front view" class="w-full h-full object-cover" data-alt="close-up portrait of a man's face looking directly at camera with clear lighting and neutral expression for biometric identification" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4sjqsAnGSu9G-_GF3XZAcl2SmjSY1Au-Ft6quRyKwBDJRNx9Gu2x1_h405Bnp6j3ZgWQ8j5VFWOd625aCtXelvikeBYww1s5fyF80jxqKYxsx44Rxl4naJ03HAI7LaDs_gipaLfRvw-Mg8ODuzNqeQUCvbBk9WdQdOAoL1rFfDVfgS0MfhR45K5v9VQaDpAYcRGmSz0YywcrJY8YplbEk2S8xHo9TNGSJfBee7qg5yPcxKQjC01m8jfswHZFGRFtvLRkCqSnGN_E"/>
<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
<button class="bg-error text-on-error w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<div class="absolute bottom-4 left-4 right-4">
<div class="bg-success/90 backdrop-blur-md px-4 py-2 rounded-full flex items-center justify-center gap-1.5 border border-white/20">
<span class="material-symbols-outlined text-[14px] text-white" data-icon="check_circle">check_circle</span>
<span class="text-[11px] font-extrabold text-white uppercase tracking-widest">正面已录入</span>
</div>
</div>
</div>
<!-- Slot 2: Empty/Dashed -->
<button class="aspect-[4/5] rounded-[2.5rem] border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-4 hover:bg-primary/5 hover:border-primary/30 transition-all group active:scale-[0.97]">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-all duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="text-sm font-bold text-outline group-hover:text-primary transition-colors">添加左侧照</span>
</button>
<!-- Slot 3: Empty/Dashed -->
<button class="aspect-[4/5] rounded-[2.5rem] border-2 border-dashed border-outline-variant flex flex-col items-center justify-center gap-4 hover:bg-primary/5 hover:border-primary/30 transition-all group active:scale-[0.97]">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-all duration-300">
<span class="material-symbols-outlined text-2xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="text-sm font-bold text-outline group-hover:text-primary transition-colors">添加右侧照</span>
</button>
<!-- Tips Card (Bento element) -->
<div class="aspect-[4/5] rounded-[2.5rem] bg-secondary-container/20 p-6 flex flex-col justify-between border border-secondary-container/30">
<div>
<div class="w-10 h-10 bg-secondary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="tips_and_updates">tips_and_updates</span>
</div>
<h3 class="text-on-secondary-container font-extrabold text-base mb-1">拍摄建议</h3>
<p class="text-[10px] text-secondary font-bold uppercase tracking-wider opacity-60">Tips &amp; Guidelines</p>
</div>
<ul class="text-[11px] text-on-secondary-container/80 space-y-3 leading-snug font-medium">
<li class="flex items-start gap-3">
<span class="w-1.5 h-1.5 rounded-full bg-secondary mt-1 shrink-0 opacity-40"></span>
                    避免佩戴墨镜、口罩或帽子
                </li>
<li class="flex items-start gap-3">
<span class="w-1.5 h-1.5 rounded-full bg-secondary mt-1 shrink-0 opacity-40"></span>
                    确保光线充足，避免背光
                </li>
<li class="flex items-start gap-3">
<span class="w-1.5 h-1.5 rounded-full bg-secondary mt-1 shrink-0 opacity-40"></span>
                    露出完整五官与面部轮廓
                </li>
</ul>
</div>
</div>
<!-- Compliance & Security -->
<div class="flex items-start gap-4 p-5 bg-surface-container-low rounded-3xl border border-surface-container-highest/50 mb-8">
<div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-xl" data-icon="verified_user">verified_user</span>
</div>
<div class="space-y-1">
<p class="text-[11px] font-bold text-primary uppercase tracking-wider">数据安全保障</p>
<p class="text-[11px] text-on-surface-variant leading-relaxed font-medium">
                您的面部数据将经过多重加密处理，仅用于企业考勤校验。熵析云枢承诺严格保护您的生物特征隐私。
            </p>
</div>
</div>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background/95 to-transparent pointer-events-none">
<div class="max-w-2xl mx-auto pointer-events-auto">
<button class="w-full bg-primary text-on-primary py-5 rounded-full font-extrabold shadow-2xl shadow-primary/30 hover:shadow-primary/50 hover:scale-[1.02] transition-all duration-300 active:scale-95 flex items-center justify-center gap-3">
<span class="tracking-wide">确认并提交注册</span>
<span class="material-symbols-outlined text-xl" data-icon="east">east</span>
</button>
</div>
</div>
</body></html>
